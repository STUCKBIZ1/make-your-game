<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Make Your Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="ui-layer" style="position: absolute; top: 10px; left: 10px; font-family: sans-serif;">
        Score: <span id="score">0</span>
    </div>
    <div id="pause-menu"
        style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: black; color: white; padding: 20px; font-family: sans-serif;">
        PAUSED - Press 'P' to Continue
    </div>
    <div id="avatar" style="position: absolute; left: 0px; top: 0px; width: 50px; height: 50px; background: red;"></div>
    </div>

    <script type="module" src="game.js"></script>
</body>

</html>
